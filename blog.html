---
layout: default
title: Blog
---
<section id="header">
    <h1>Blog</h1>
    <p class="bio">
        Under construction...
    </p>
</section>

<section id="blog-list">
    {% for post in site.posts %}
    <div class="post-entry">
        <span class="date">{{ post.date | date: "%b %-d, %Y" }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
    </div>
    {% endfor %}
</section>
