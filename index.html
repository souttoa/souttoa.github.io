<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav class="top-nav">
            <a href="/">home</a>
            <a href="/blog">blog</a>
        </nav>

        <section id="header">
            <h1>My Portfolio</h1>
            <p class="bio">
                I'm a computer science student and video engineer. I enjoy building things for the web and working with broadcast tech.
            </p>
        </section>

        <section id="blog-list">
            {% for post in site.posts %}
            <div class="post-entry">
                <span class="date">{{ post.date | date: "%b %-d, %Y" }}</span>
                <a href="blog/first-post.html">{{ post.title }}</a>
            </div>
            {% endfor %}
        </section>

        <footer>
            <nav class="footer-nav">
                <a href="rss.xml">↗ rss</a>
                <a href="https://github.com/souttoa">↗ github</a>
            </nav>
        </footer>
    </main>
</body>
</html>
